description: >-
  AstraZeneca is a British-Swedish multinational pharmaceutical and
  biotechnology company focused on oncology, cardiovascular, renal,
  metabolism, and respiratory therapies. AstraZeneca does not publish a
  general developer portal or commercial public APIs; technology integration
  is delivered through enterprise partner programs, clinical trial data
  portals such as clinicaltrials.gov and the Vivli platform, and EDI/x12
  channels used by distributors and pharmacy benefit managers.
